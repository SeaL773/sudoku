<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Sudoku</h1>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="play">Play</button>
        <button class="mode-tab" data-mode="custom">Custom</button>
      </div>
    </header>

    <div class="game-layout">
      <div class="board-panel">
        <div class="board" id="board"></div>
      </div>

      <div class="controls-panel">

        <div id="play-controls">
          <div class="difficulty-selector">
            <button class="diff-btn" data-difficulty="easy">Easy</button>
            <button class="diff-btn active" data-difficulty="medium">Medium</button>
            <button class="diff-btn" data-difficulty="hard">Hard</button>
            <button class="diff-btn" data-difficulty="expert">Expert</button>
            <button class="diff-btn" data-difficulty="evil">Evil</button>
            <button class="diff-btn" data-difficulty="extreme">Extreme</button>
          </div>

          <div class="seed-row">
            <label class="seed-label" for="seed-input">Seed</label>
            <input type="text" id="seed-input" class="seed-input" spellcheck="false" autocomplete="off">
            <button class="seed-go-btn" id="seed-go">Go</button>
          </div>

          <div class="timer" id="timer">00:00</div>

          <div class="actions">
            <button class="action-btn" id="btn-undo">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
              <span>Undo</span>
            </button>
            <button class="action-btn" id="btn-erase">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                <line x1="18" y1="9" x2="12" y2="15"/>
                <line x1="12" y1="9" x2="18" y2="15"/>
              </svg>
              <span>Erase</span>
            </button>
            <button class="action-btn" id="btn-notes">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              <span>Notes</span>
            </button>
            <button class="action-btn" id="btn-hint">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18h6"/>
                <path d="M10 22h4"/>
                <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5.76.76 1.23 1.52 1.41 2.5"/>
              </svg>
              <span>Hint</span>
            </button>
          </div>

          <div class="numpad" id="numpad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
          </div>

          <button class="new-game-btn" id="btn-new-game">New Game</button>
        </div>

        <div id="custom-controls" class="hidden">
          <div class="custom-import">
            <label for="import-input">Import puzzle (81 chars, 0=empty)</label>
            <div class="import-row">
              <input type="text" id="import-input" class="import-input" maxlength="120" spellcheck="false" autocomplete="off" placeholder="e.g. 530070000600195000098000060...">
              <button class="btn-secondary" id="btn-load">Load</button>
            </div>
          </div>

          <div class="custom-numpad" id="custom-numpad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
          </div>

          <div class="custom-actions">
            <button class="new-game-btn" id="btn-solve">Solve</button>
            <button class="btn-secondary" id="btn-clear">Clear</button>
          </div>

          <div class="status-bar" id="status-bar"></div>
        </div>

      </div>
    </div>
  </div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-content">
      <h2>Congratulations!</h2>
      <p>You solved the puzzle in</p>
      <div class="win-time" id="win-time">00:00</div>
      <button class="new-game-btn" id="btn-play-again">New Game</button>
    </div>
  </div>

  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
