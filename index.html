<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <meta name="description" content="Free Sudoku game with 6 difficulty levels, daily challenges, seed sharing, and 15 interactive training lessons. No ads, no login, pure client-side.">
  <meta property="og:title" content="Sudoku">
  <meta property="og:description" content="Free Sudoku with daily challenges, puzzle generator, and training lessons.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://seal773.github.io/sudoku/">
  <meta name="theme-color" content="#325aaf">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1>Sudoku</h1>
        <button class="settings-btn" id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-popover hidden" id="settings-popover">
          <div class="settings-section">
            <label class="settings-label">Difficulty</label>
            <div class="difficulty-selector">
              <button class="diff-btn" data-difficulty="easy">Easy</button>
              <button class="diff-btn active" data-difficulty="medium">Medium</button>
              <button class="diff-btn" data-difficulty="hard">Hard</button>
              <button class="diff-btn" data-difficulty="expert">Expert</button>
              <button class="diff-btn" data-difficulty="evil">Evil</button>
              <button class="diff-btn" data-difficulty="extreme">Extreme</button>
            </div>
          </div>
          <div class="settings-section">
            <label class="settings-label" for="seed-input">Seed</label>
            <div class="settings-row">
              <input type="text" id="seed-input" class="seed-input" spellcheck="false" autocomplete="off">
              <button class="seed-apply-btn" id="seed-apply">Apply</button>
            </div>
          </div>
          <div class="settings-section">
            <label class="settings-label">Theme</label>
            <div class="theme-toggle">
              <button class="theme-btn active" data-theme="auto">Auto</button>
              <button class="theme-btn" data-theme="light">Light</button>
              <button class="theme-btn" data-theme="dark">Dark</button>
            </div>
          </div>
        </div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="play">Play</button>
        <button class="mode-tab" data-mode="daily">Daily</button>
        <button class="mode-tab" data-mode="custom">Custom</button>
        <a href="train.html" class="mode-tab mode-tab-link">Train</a>
      </div>
    </header>

    <div class="game-layout">
      <div class="board-panel">
        <div class="board" id="board"></div>
        <div class="pause-overlay hidden" id="pause-overlay">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
          <span>Paused</span>
        </div>
      </div>

      <div class="controls-panel">

        <div class="panel-header">
          <div class="info-row" id="info-label-row">
            <span id="info-label">Medium</span>
            <span id="info-badge"></span>
          </div>
          <div class="info-row" id="info-stats-row">
            <span id="info-mistakes">Mistakes: 0/3</span>
            <span class="info-timer" id="info-timer">00:00</span>
          </div>
          <div class="info-row" id="info-secondary-row"></div>
        </div>

        <div class="actions" id="actions">
          <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            <span>Undo</span>
          </button>
          <button class="action-btn" id="btn-erase" title="Erase (Backspace)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
            <span>Erase</span>
          </button>
          <button class="action-btn" id="btn-notes" title="Notes (N)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            <span>Notes</span>
          </button>
          <button class="action-btn" id="btn-hint" title="Hint (H)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18h6"/>
              <path d="M10 22h4"/>
              <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5.76.76 1.23 1.52 1.41 2.5"/>
            </svg>
            <span>Hint</span>
          </button>
        </div>

        <div class="numpad" id="numpad">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>
          <button class="num-btn" data-num="7">7</button>
          <button class="num-btn" data-num="8">8</button>
          <button class="num-btn" data-num="9">9</button>
        </div>

        <div class="panel-footer" id="panel-footer">
          <button class="new-game-btn" id="btn-new-game">New Game</button>
          <div class="custom-actions hidden" id="custom-footer-actions">
            <button class="new-game-btn" id="btn-solve">Solve</button>
            <button class="btn-secondary" id="btn-clear">Clear</button>
          </div>
          <div class="status-bar hidden" id="status-bar"></div>
        </div>

      </div>
    </div>
  </div>

  <div class="mistake-overlay hidden" id="mistake-overlay">
    <div class="mistake-content">
      <h2>Game Over</h2>
      <p>You have made 3 mistakes.</p>
      <div class="win-buttons">
        <button class="new-game-btn" id="btn-mistake-new">New Game</button>
        <button class="btn-secondary" id="btn-mistake-continue">Continue</button>
      </div>
    </div>
  </div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-content">
      <h2>Congratulations!</h2>
      <p>You solved the puzzle in</p>
      <div class="win-time" id="win-time">00:00</div>
      <div class="win-stats" id="win-stats">
        <span id="win-mistakes">Mistakes: 0</span>
        <span id="win-hints">Hints: 0</span>
      </div>
      <div class="win-best" id="win-best"></div>
      <div class="win-buttons">
        <button class="new-game-btn" id="btn-play-again">New Game</button>
        <button class="btn-secondary" id="btn-win-close">Close</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="https://github.com/SeaL773/sudoku" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
